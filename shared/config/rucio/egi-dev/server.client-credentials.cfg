[common]
logdir = /var/log/rucio
loglevel = DEBUG

[database]
default = postgresql+psycopg://rucio:rucio@ruciodb/rucio
pool_recycle = 3600
echo = 0
pool_reset_on_return = rollback

[policy]
permission = generic
schema = generic
lfn2pfn_algorithm_default = hash
support = https://github.com/rucio/rucio/issues/
support_rucio = https://github.com/rucio/rucio/issues/

[client]
rucio_host = http://rucio-server
auth_host = http://rucio-server
auth_type = userpass
username = ddmlab
password = secret
account = root
request_retries = 3

[bootstrap]
userpass_identity = ddmlab
userpass_pwd = secret
userpass_email = rucio-dev@cern.ch

[oidc]
idpsecrets = /opt/rucio/etc/idpsecrets.json
issuer = https://aai-dev.egi.eu/auth/realms/egi
expected_audience = rucio
admin_issuer = https://aai-dev.egi.eu/auth/realms/egi
expected_scope = openid profile eduperson_entitlement offline_access
token_strategy = client_credentials

[trace]
tracedir = /var/log/rucio/trace
brokers = localhost
port = 61013
topic = /topic/rucio.tracer
username = rucio
password = rucio

[conveyor]
scheme = root,davs,s3,s3s,https,http
transfertool = fts3
cacert = /etc/grid-security/certificates/rucio_ca.pem
usercert = /etc/grid-security/hostcert_with_key.pem
use_certificate_proxy = False
allow_user_oidc_tokens = True
default_lifetime = -1
poller_oidc_support = True

[alembic]
cfg = /opt/rucio/etc/alembic.ini

[api]
endpoints = accountlimits, accounts, archives, auth, config, credentials, dids, export, heartbeats, identities, import, lifetime_exceptions, locks, meta_conventions, ping, redirect, replicas, requests, rses, rules, scopes, subscriptions, vos

[credentials]
gcs = /opt/rucio/etc/rse-accounts.cfg
