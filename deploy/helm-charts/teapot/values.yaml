image:
  repository: mgajekcern/teapot
  tag: "latest"
  pullPolicy: IfNotPresent

fullnameOverride: "teapot"

service:
  type: ClusterIP
  port: 8081

volumes: []
volumeMounts: []

# Referenced by other templates in this chart (not the deployment).
# Kept here as subchart defaults; umbrella can override per instance.
userMapping: "teapot 33ec5a95-4955-484d-9b21-818e19a8d749"
keycloakIssuer: "https://keycloak:8443/realms/rucio"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
