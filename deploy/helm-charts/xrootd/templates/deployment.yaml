apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xrootd.fullname" . }}
  labels:
    app: {{ include "xrootd.name" . }}
    instance: {{ include "xrootd.fullname" . }}
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "xrootd.name" . }}
      instance: {{ include "xrootd.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "xrootd.name" . }}
        instance: {{ include "xrootd.fullname" . }}
        release: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      hostname: {{ include "xrootd.fullname" . }}
      containers:
        - name: xrootd
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "/usr/local/bin/docker-entrypoint.sh"]
          env:
            - name: XRDPORT
              value: {{ .Values.xrdPort | quote }}
          ports:
            - name: xrootd
              containerPort: {{ .Values.xrdPort }}
              protocol: TCP
          volumeMounts:
            {{- range $mount := .Values.volumeMounts }}
            - name: {{ $mount.name }}
              mountPath: {{ $mount.mountPath }}
              {{- if hasKey $mount "subPath" }}
              subPath: {{ tpl $mount.subPath $ }}
              {{- end }}
              {{- if hasKey $mount "readOnly" }}
              readOnly: {{ $mount.readOnly }}
              {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- toYaml .Values.volumes | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
