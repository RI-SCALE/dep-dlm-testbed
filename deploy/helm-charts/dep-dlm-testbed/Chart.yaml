apiVersion: v2
name: dep-dlm-testbed
description: |
  Meta-package bundling every service in the dep-dlm-testbed
  (Rucio server, FTS, Keycloak, XRootD, StoRM-WebDAV) including their Postgres / MySQL databases.
type: application
version: 0.1.0
appVersion: "1.0"
keywords:
  - dep-dlm
  - rucio
  - testbed
  - storage
  - fts

dependencies:
  - name: postgresql
    version: "~18.3.0"
    repository: https://charts.bitnami.com/bitnami
    alias: ruciodb
    condition: ruciodb.enabled

  - name: rucio-server
    version: "~40.0.0"
    repository: "file://../rucio-server"
    alias: rucio-server
    condition: "rucio-server.enabled"

  - name: fts
    version: "0.1.0"
    repository: "file://../fts"
    alias: fts
    condition: fts.enabled

  - name: keycloak
    version: "0.1.0"
    repository: "file://../keycloak"
    condition: keycloak.enabled

  - name: xrootd
    version: "0.1.0"
    repository: "file://../xrootd"
    alias: xrd3
    condition: xrd3.enabled
  - name: xrootd
    version: "0.1.0"
    repository: "file://../xrootd"
    alias: xrd4
    condition: xrd4.enabled

  - name: rucio-client
    version: "0.1.0"
    alias: "rucio-client"
    repository: "file://../rucio-client"
    condition: "rucio-client.enabled"

  - name: rucio-daemons
    version: "~40.0.0"
    repository: "file://../rucio-daemons"
    alias: rucio-daemons
    condition: rucio-daemons.enabled

  - name: teapot
    version: "0.1.0"
    repository: "file://../teapot"
    alias: teapot1
    condition: teapot1.enabled

  - name: teapot
    version: "0.1.0"
    repository: "file://../teapot"
    alias: teapot2
    condition: teapot2.enabled
