# ============================================================================
# dep-dlm-testbed — umbrella values
# ============================================================================
# This file is the single source of truth for the testbed. Each top-level key
# below corresponds to a dependency alias in Chart.yaml and is passed directly
# to that subchart as its .Values.
#
# Shared resources are created by templates in this chart and consumed
# by all subcharts, e.g.:
#   - Secret      "testbed-certs"   (all PEMs)
#   - ConfigMap   "testbed-configs" (all non-secret config files)
#   - ConfigMap   "testbed-scripts" (all entrypoint/test scripts)
#
# These are populated from files/ under this chart. See README.md for how to
# place your source tree before running `helm install`.

# Options: unmanaged, managed
global:
  tokenMode: managed

certs:
  create: true
  secretName: testbed-certs
  files:
    hostcert.pem: ""
    hostkey.pem: ""
    hostcert_with_key.pem: ""
    rucio_ca.pem: ""
    xrdcert.pem: ""
    xrdkey.pem: ""
    keycloakcert.pem: ""
    keycloakkey.pem: ""
    teapot1cert.pem: ""
    teapot1key.pem: ""
    teapot2cert.pem: ""
    teapot2key.pem: ""
    5fca1cb1.0: ""
    b96dc756.0: ""
    5fca1cb1.signing_policy: ""
    b96dc756.signing_policy: ""

configs:
  create: true
  configMapName: testbed-configs
scripts:
  create: true
  configMapName: testbed-scripts
patches:
  create: true
  configMapName: testbed-patches
tests:
  create: true
  configMapName: testbed-tests

# DATABASES

ruciodb:
  image:
    tag: "latest"
  enabled: true
  fullnameOverride: ruciodb
  auth:
    username: rucio
    password: rucio
    database: rucio
  primary:
    persistence:
      enabled: true
      size: 2Gi


# Rucio Server

rucio:
  enabled: true
  fullnameOverride: rucio
  replicaCount: 1
  image:
    repository: rucio/rucio-server
    tag: release-40.0.0
    pullPolicy: IfNotPresent
  useSSL: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  useDeprecatedImplicitSecrets: false

  lifecycle:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            dnf -y install yum-utils epel-release.noarch &&
            dnf install -y --exclude=globus-gssapi-gsi gfal2-all python3-gfal2 \
              python3-gfal2-util gfal2-plugin-http --skip-broken ||
            echo "gfal2 install failed"
  additionalEnvs:
    - name: REQUESTS_CA_BUNDLE
      value: /etc/grid-security/certificates/rucio_ca.pem
    - name: SSL_CERT_FILE
      value: /etc/pki/tls/certs/ca-bundle.crt

  secretMounts:
    # Same directory mount as the GSI server
    - secretFullName: testbed-certs
      volumeName: certs-grid
      mountPath: /etc/grid-security
      defaultMode: 0600
      items:
        - { key: hostcert.pem,          path: hostcert.pem }
        - { key: hostkey.pem,           path: hostkey.pem }
        - { key: hostcert_with_key.pem, path: hostcert_with_key.pem }
        - { key: rucio_ca.pem,          path: certificates/rucio_ca.pem }
        - { key: rucio_ca.pem,          path: certificates/5fca1cb1.0 }

    - secretFullName: rucio-server-cfg
      volumeName: rucio-cfg-server
      mountPath: /opt/rucio/etc/rucio.cfg
      subPath: server.cfg
    - secretFullName: rucio-server-cfg
      volumeName: rucio-cfg-alembic
      mountPath: /opt/rucio/etc/alembic.ini
      subPath: alembic.ini
    - secretFullName: rucio-server-cfg
      volumeName: idpsecrets
      mountPath: /opt/rucio/etc/idpsecrets.json
      subPath: idpsecrets.json

    # Python patches
    - secretFullName: testbed-patches
      volumeName: fts3-patch
      mountPath: /usr/local/lib/python3.9/site-packages/rucio/transfertool/fts3.py
      subPath: rucio--fts3.py
    - secretFullName: testbed-patches
      volumeName: oidc-patch
      mountPath: /usr/local/lib/python3.9/site-packages/rucio/core/oidc.py
      subPath: rucio--oidc.py
    - secretFullName: testbed-patches
      volumeName: constants-patch
      mountPath: /usr/local/lib/python3.9/site-packages/rucio/common/constants.py
      subPath: rucio--constants.py

# FTS

fts:
  enabled: true
  fullnameOverride: fts
  ftsdb:
    enabled: true
    hostname: ftsdb
  ftsdbHost: ftsdb

  volumes:
    - name: certs
      secret:
        secretName: testbed-certs
        defaultMode: 0600
        items:
          - key: hostcert.pem
            path: hostcert.pem
            mode: 0600

          - key: hostkey.pem
            path: hostkey.pem
            mode: 0600

          - key: rucio_ca.pem
            path: rucio_ca.pem
            mode: 0644

          - key: 5fca1cb1.0
            path: 5fca1cb1.0
            mode: 0644

          - key: 5fca1cb1.signing_policy
            path: 5fca1cb1.signing_policy
            mode: 0644

          - key: b96dc756.0
            path: b96dc756.0
            mode: 0644

          - key: b96dc756.signing_policy
            path: b96dc756.signing_policy
            mode: 0644

    - name: scripts
      configMap:
        name: testbed-scripts
        defaultMode: 0755

    - name: scripts-fts
      configMap:
        name: testbed-scripts-fts
        defaultMode: 0755

    - name: configs
      configMap:
        name: testbed-configs

    - name: patches
      secret:
        secretName: testbed-patches

  volumeMounts:
    # Certs
    - name: certs
      mountPath: /etc/grid-security/hostcert.pem
      subPath: hostcert.pem
    - name: certs
      mountPath: /etc/grid-security/hostkey.pem
      subPath: hostkey.pem
    - name: certs
      mountPath: /etc/grid-security/certificates/5fca1cb1.0
      subPath: 5fca1cb1.0
    - name: certs
      mountPath: /etc/grid-security/certificates/5fca1cb1.signing_policy
      subPath: 5fca1cb1.signing_policy
    - name: certs
      mountPath: /etc/grid-security/certificates/b96dc756.0
      subPath: b96dc756.0
    - name: certs
      mountPath: /etc/grid-security/certificates/b96dc756.signing_policy
      subPath: b96dc756.signing_policy
    - name: certs
      mountPath: /etc/pki/ca-trust/source/anchors/rucio-ca.crt
      subPath: rucio_ca.pem
      readOnly: false

    # Scripts directory
    - name: scripts
      mountPath: /scripts

    # FTS configs (token-mode conditional for fts3restconfig)
    - name: configs
      mountPath: /etc/fts3/fts3config
      subPath: fts3config
    - name: configs
      mountPath: /etc/fts3/fts3restconfig
      subPath: '{{ if eq .Values.global.tokenMode "managed" }}managed.fts3restconfig{{ else }}unmanaged.fts3restconfig{{ end }}'
    - name: configs
      mountPath: /etc/gfal2.d/http_plugin.conf
      subPath: gfal2_http_plugin.conf

    # Entrypoint
    - name: scripts-fts
      mountPath: /docker-entrypoint.sh
      subPath: docker-entrypoint.sh

    # Python patches for fts-rest-flask
    - name: patches
      mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/config/middleware.py
      subPath: fts--middleware.py
    - name: patches
      mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/lib/openidconnect.py
      subPath: fts--openidconnect.py


# Keycloak

keycloak:
  enabled: true
  fullnameOverride: keycloak

  volumes:
    - name: certs
      secret:
        secretName: testbed-certs

    - name: configs
      configMap:
        name: testbed-configs

  volumeMounts:
    - name: certs
      mountPath: /etc/x509/https/keycloakcert.pem
      subPath: keycloakcert.pem
      readOnly: true

    - name: certs
      mountPath: /etc/x509/https/keycloakkey.pem
      subPath: keycloakkey.pem
      readOnly: true

    - name: configs
      mountPath: /opt/keycloak/data/import/realm.json
      subPath: realm.json
      readOnly: true

# XRootD storage endpoints

xrd3:
  enabled: true
  fullnameOverride: xrd3

  volumes:
    - name: certs
      secret:
        secretName: testbed-certs
        defaultMode: 0600
        items:
          - key: xrd3cert.pem
            path: xrd3cert.pem
            mode: 0600

          - key: xrd3key.pem
            path: xrd3key.pem
            mode: 0600

          - key: rucio_ca.pem
            path: rucio_ca.pem
            mode: 0644

    - name: configs
      configMap:
        name: testbed-configs

    - name: scripts
      configMap:
        name: testbed-scripts-xrootd
        defaultMode: 0755

  volumeMounts:
    - name: certs
      mountPath: /etc/grid-security/certificates/5fca1cb1.0
      subPath: rucio_ca.pem
    - name: certs
      mountPath: /tmp/xrdcert.pem
      subPath: xrd3cert.pem
    - name: certs
      mountPath: /tmp/xrdkey.pem
      subPath: xrd3key.pem
    - name: certs
      mountPath: /etc/pki/ca-trust/source/anchors/rucio-ca.crt
      subPath: rucio_ca.pem
    - name: scripts
      mountPath: /usr/local/bin/docker-entrypoint.sh
      subPath: docker-entrypoint.sh
      readOnly: true
    - name: configs
      mountPath: /etc/xrootd/xrdrucio.cfg
      subPath: xrdrucio-scitokens.cfg
      readOnly: true
    - name: configs
      mountPath: /etc/xrootd/authdb
      subPath: authdb
      readOnly: true
    - name: configs
      mountPath: /etc/xrootd/scitokens.conf
      subPath: scitokens.conf
      readOnly: true

xrd4:
  enabled: true
  fullnameOverride: xrd4

  volumes:
    - name: certs
      secret:
        secretName: testbed-certs
        defaultMode: 0600
        items:
          - key: xrd4cert.pem
            path: xrd4cert.pem
            mode: 0600

          - key: xrd4key.pem
            path: xrd4key.pem
            mode: 0600

          - key: rucio_ca.pem
            path: rucio_ca.pem
            mode: 0644

    - name: configs
      configMap:
        name: testbed-configs

    - name: scripts
      configMap:
        name: testbed-scripts-xrootd
        defaultMode: 0755

  volumeMounts:
    - name: certs
      mountPath: /etc/grid-security/certificates/5fca1cb1.0
      subPath: rucio_ca.pem
    - name: certs
      mountPath: /tmp/xrdcert.pem
      subPath: xrd4cert.pem
    - name: certs
      mountPath: /tmp/xrdkey.pem
      subPath: xrd4key.pem
    - name: certs
      mountPath: /etc/pki/ca-trust/source/anchors/rucio-ca.crt
      subPath: rucio_ca.pem
    - name: scripts
      mountPath: /usr/local/bin/docker-entrypoint.sh
      subPath: docker-entrypoint.sh
      readOnly: true
    - name: configs
      mountPath: /etc/xrootd/xrdrucio.cfg
      subPath: xrdrucio-scitokens.cfg
      readOnly: true
    - name: configs
      mountPath: /etc/xrootd/authdb
      subPath: authdb
      readOnly: true
    - name: configs
      mountPath: /etc/xrootd/scitokens.conf
      subPath: scitokens.conf
      readOnly: true

# Rucio client pod

"rucio-client":
  enabled: true
  fullnameOverride: rucio-client

  volumes:
    - name: certs
      secret:
        secretName: testbed-certs
        defaultMode: 0600

    - name: configs
      configMap:
        name: testbed-configs

    - name: scripts
      configMap:
        name: testbed-scripts
        defaultMode: 0755

    - name: tests
      configMap:
        name: testbed-tests
        defaultMode: 0755

  volumeMounts:
    - name: certs
      mountPath: /etc/grid-security/hostcert.pem
      subPath: hostcert.pem
      readOnly: true
    - name: certs
      mountPath: /etc/grid-security/hostkey.pem
      subPath: hostkey.pem
      readOnly: true
    - name: certs
      mountPath: /etc/grid-security/certificates/5fca1cb1.0
      subPath: rucio_ca.pem
      readOnly: true
    - name: certs
      mountPath: /etc/grid-security/certificates/rucio_ca.pem
      subPath: rucio_ca.pem
      readOnly: true
    - name: configs
      mountPath: /opt/rucio/etc/userpass-client.cfg
      subPath: userpass-client.cfg
      readOnly: true
    - name: configs
      mountPath: /opt/rucio/etc/rucio.cfg
      subPath: userpass-client.cfg
      readOnly: true
    - name: scripts
      mountPath: /scripts
      readOnly: true
    - name: tests
      mountPath: /tests
      readOnly: true

# Teapot pod

teapot1:
  enabled: true
  fullnameOverride: teapot1

  volumes:
    - name: certs
      secret:
        secretName: testbed-certs
        defaultMode: 0600
        items:
          - key: teapot1cert.pem
            path: teapot1cert.pem
            mode: 0600

          - key: teapot1key.pem
            path: teapot1key.pem
            mode: 0600

          - key: storm-webdav-localhostcert.pem
            path: storm-webdav-localhostcert.pem
            mode: 0644

          - key: storm-webdav-localhostkey.pem
            path: storm-webdav-localhostkey.pem
            mode: 0644

          - key: rucio_ca.pem
            path: rucio_ca.pem
            mode: 0644

    - name: trust
      secret:
        secretName: testbed-certs
        items:
          - key: rucio_ca.pem
            path: 5fca1cb1.0

          - key: rucio_ca.pem
            path: b96dc756.0

          - key: 5fca1cb1.signing_policy
            path: 5fca1cb1.signing_policy

          - key: b96dc756.signing_policy
            path: b96dc756.signing_policy

    - name: configs
      configMap:
        name: testbed-configs

    - name: patches
      secret:
        secretName: testbed-patches

    - name: teapot-data
      persistentVolumeClaim:
        claimName: teapot1-data

  volumeMounts:
    # Teapot config files
    - name: configs
      mountPath: /etc/teapot/config.ini
      subPath: config.ini
      readOnly: true
    - name: configs
      mountPath: /etc/teapot/user-mapping.csv
      subPath: user-mapping.csv
      readOnly: true
    - name: configs
      mountPath: /etc/teapot/logback.xml
      subPath: logback.xml
      readOnly: true
    # Teapot TLS cert + key
    - name: certs
      mountPath: /var/lib/teapot/webdav/teapot.crt
      subPath: teapot1cert.pem
    - name: certs
      mountPath: /var/lib/teapot/webdav/teapot.key
      subPath: teapot1key.pem
    # Rucio CA (Teapot-testing CA + system trust)
    - name: certs
      mountPath: /var/lib/teapot/webdav/Teapot-testing.crt
      subPath: rucio_ca.pem
    - name: certs
      mountPath: /usr/local/share/ca-certificates/rucio-ca.crt
      subPath: rucio_ca.pem
    # Storm-WebDAV internal TLS
    - name: certs
      mountPath: /etc/storm/webdav/localhost.crt
      subPath: storm-webdav-localhostcert.pem
    - name: certs
      mountPath: /etc/storm/webdav/localhost.key
      subPath: storm-webdav-localhostkey.pem
    # canl trust anchors
    - name: trust
      mountPath: /etc/grid-security/certificates
      readOnly: true
    # Storm-WebDAV application.yml + storage area
    - name: configs
      mountPath: /var/lib/teapot/user-teapot/config/application.yml
      subPath: application.yml
      readOnly: true
    - name: configs
      mountPath: /var/lib/teapot/user-teapot/sa.d/data.properties
      subPath: data.properties
      readOnly: true
    # Patched teapot.py
    - name: patches
      mountPath: /usr/share/teapot/teapot.py
      subPath: teapot--teapot.py
      readOnly: true

