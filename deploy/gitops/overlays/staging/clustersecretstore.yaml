# Staging ClusterSecretStore — SAME NAME (dep-dlm-vault) as sandbox so the base
# ExternalSecrets are unchanged. Difference: points at a REAL Vault and uses
# Kubernetes auth (not a static root token). The Vault is seeded out-of-band by
# an operator — there is NO seed Job at this rung.
# TODO: set server, role, and the kubernetes auth mount path for your Vault.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dep-dlm-vault
spec:
  provider:
    vault:
      server: "https://vault.example.internal:8200"   # TODO: real Vault
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "dep-dlm"                              # TODO: Vault role
          serviceAccountRef:
            name: external-secrets
