# Rucio daemons — UPSTREAM chart, values from base/values/rucio-daemons.yaml.
# TODO: upstream chart does not render secretMounts[].items or .lifecycle yet.
# Until upstreamed, add an Argo Kustomize/Helm post-render patch to inject them
# (the testbed vendored chart did this directly). Without it the CA won't land
# at /etc/grid-security/certificates/rucio_ca.pem and the submitter will fail.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rucio-daemons
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "11" }
spec:
  project: default
  sources:
    - repoURL: https://rucio.github.io/helm-charts
      chart: rucio-daemons
      targetRevision: 40.0.0
      helm:
        valueFiles:
          - $values/deploy/gitops/base/values/rucio-daemons.yaml
    - repoURL: https://github.com/ri-scale/dep-dlm-testbed.git
      targetRevision: feat/gitops-deployment-blueprint
      ref: values
  destination: { server: https://kubernetes.default.svc, namespace: dep-dlm-staging }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
