# ============================================================================
# DEP DLM GitOps — sandbox overrides (the thin per-env margin)
# ============================================================================
# Everything internal, ephemeral. These layer on base/values/*. Only what
# differs from base lives here; the architecture (ESO mounts, component values)
# is shared.
idp:        { internal: true }
storage:
  xrootd:   { internal: true }
  webdav:   { internal: true }
tokenFlow:  managed

postgresql:
  fullnameOverride: ruciodb
  auth: { username: rucio, password: rucio, database: rucio }   # sandbox-only
  primary:
    persistence: { enabled: false }                              # ephemeral

vault:
  server:
    dev: { enabled: true, devRootToken: "root" }                 # sandbox-only
    dataStorage: { enabled: false }
    ha: { enabled: false }

externalSecrets:
  installCRDs: true
