apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dep-dlm-sandbox
resources:
  - ../../base/externalsecrets        # the four testbed-* ExternalSecrets
  - clustersecretstore.yaml           # dev Vault store (cluster-scoped) + root token Secret
  - seed-job.yaml                     # PreSync hook: load testbed files into Vault
# Per-component chart values live in base/values and are referenced by the
# Argo Applications (base/applications), not kustomize-built here.
#
# NOTE: `namespace: dep-dlm-sandbox` applies only to namespaced kinds; the
# cluster-scoped ClusterSecretStore is left without a namespace as required.
