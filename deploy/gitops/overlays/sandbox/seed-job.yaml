# Sandbox seed Job — clones the repo, GENERATES the runtime certs (they are
# gitignored, only the CA is committed), then loads everything into the dev
# Vault so the base ExternalSecrets can project it. SANDBOX-ONLY.
#
# Pipeline (initContainers run in order, then the main container):
#   1. clone     — git clone the repo+branch into /repo
#   2. gen-certs — run shared/scripts/generate-certs.sh (needs openssl+bash);
#                  uses the committed rucio_ca.pem/key to mint host/xrd/teapot/
#                  keycloak certs + trust anchors into /repo/certs (an emptyDir,
#                  so the generated files persist to the seed container)
#   3. seed      — vault kv put key=@file for certs/configs/patches/rucio
#
# Argo PreSync hook so it runs before the ExternalSecrets need data.
#
# TODO: set the clone URL/branch to match your Argo repoURL.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed
  namespace: dep-dlm-sandbox
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - { name: repo, emptyDir: {} }
      initContainers:
        - name: clone
          image: alpine/git:latest
          args:
            - clone
            - --depth=1
            - --branch=feat/gitops-deployment-blueprint
            - https://github.com/ri-scale/dep-dlm-testbed.git
            - /repo
          volumeMounts:
            - { name: repo, mountPath: /repo }
        - name: gen-certs
          # alpine + openssl + bash: generate-certs.sh needs all three.
          image: alpine:3.20
          command: ["/bin/sh","-c"]
          args:
            - |
              set -e
              apk add --no-cache bash openssl >/dev/null
              cd /repo
              # The script writes into ./certs and requires the committed CA.
              test -f certs/rucio_ca.pem || { echo "CA missing in clone"; exit 1; }
              bash shared/scripts/generate-certs.sh
              echo "generated certs:"; ls -1 certs | head -40
          volumeMounts:
            - { name: repo, mountPath: /repo }
      containers:
        - name: seed
          image: hashicorp/vault:1.17
          env:
            - { name: VAULT_ADDR,  value: "http://vault.dep-dlm-sandbox.svc:8200" }
            - { name: VAULT_TOKEN, value: "root" }     # sandbox dev token
            - { name: FLOW,        value: "managed" }  # managed|unmanaged
          command: ["/bin/sh","-c"]
          args:
            - |
              set -e
              cd /repo
              CFG=server.token-exchange.cfg
              [ "$FLOW" = "unmanaged" ] && CFG=server.client-credentials.cfg
              # Trust-anchor names (5fca1cb1.*, b96dc756.*) are the new+old
              # openssl hashes of the COMMITTED CA, so they are deterministic and
              # match what base/values/* mount. Seed them by their known names.
              vault kv put secret/dep-dlm/certs \
                hostcert.pem=@certs/hostcert.pem \
                hostkey.pem=@certs/hostkey.pem \
                hostcert_with_key.pem=@certs/hostcert_with_key.pem \
                rucio_ca.pem=@certs/rucio_ca.pem \
                5fca1cb1.0=@certs/5fca1cb1.0 \
                5fca1cb1.signing_policy=@certs/5fca1cb1.signing_policy \
                b96dc756.0=@certs/b96dc756.0 \
                b96dc756.signing_policy=@certs/b96dc756.signing_policy \
                keycloakcert.pem=@certs/keycloakcert.pem \
                keycloakkey.pem=@certs/keycloakkey.pem \
                xrd3cert.pem=@certs/xrd3cert.pem \
                xrd3key.pem=@certs/xrd3key.pem \
                teapot1cert.pem=@certs/teapot1cert.pem \
                teapot1key.pem=@certs/teapot1key.pem \
                storm-webdav-localhostcert.pem=@certs/storm-webdav-localhostcert.pem \
                storm-webdav-localhostkey.pem=@certs/storm-webdav-localhostkey.pem
              vault kv put secret/dep-dlm/configs \
                fts3config=@shared/config/fts/fts3config \
                gfal2_http_plugin.conf=@shared/config/fts/gfal2_http_plugin.conf \
                fts3restconfig=@shared/config/fts/${FLOW}.fts3restconfig \
                realm.json=@shared/config/keycloak/realm.json \
                xrdrucio-scitokens.cfg=@shared/config/xrootd/xrdrucio-scitokens.cfg \
                authdb=@shared/config/xrootd/authdb \
                scitokens.conf=@shared/config/xrootd/scitokens.conf \
                config.ini=@shared/config/teapot/config.ini \
                user-mapping.csv=@shared/config/teapot/user-mapping.csv \
                logback.xml=@shared/config/teapot/logback.xml \
                application.yml=@shared/config/teapot/application.yml \
                data.properties=@shared/config/teapot/data.properties
              vault kv put secret/dep-dlm/patches \
                rucio--fts3.py=@shared/patches/rucio/fts3.py \
                rucio--oidc.py=@shared/patches/rucio/oidc.py \
                rucio--constants.py=@shared/patches/rucio/constants.py \
                fts--middleware.py=@shared/patches/fts/middleware.py \
                fts--openidconnect.py=@shared/patches/fts/openidconnect.py \
                fts--JobBuilder.py=@shared/patches/fts/JobBuilder.py \
                teapot--teapot.py=@shared/patches/teapot/teapot.py
              vault kv put secret/dep-dlm/rucio \
                server.cfg=@shared/config/rucio/${CFG} \
                alembic.ini=@shared/config/rucio/alembic.ini \
                idpsecrets.json=@shared/config/rucio/idpsecrets.json
              vault kv put secret/dep-dlm/scripts-xrootd \
                docker-entrypoint.sh=@shared/scripts/xrootd/docker-entrypoint.sh
              echo "seed complete"
          volumeMounts:
            - { name: repo, mountPath: /repo }
