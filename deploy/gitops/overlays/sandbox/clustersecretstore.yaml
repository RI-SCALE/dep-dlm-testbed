# ClusterSecretStore → sandbox dev Vault. VALIDATED working in-cluster:
# Vault(secret/data/dep-dlm/*) -> this store -> ESO -> testbed-* Secrets.
# SANDBOX-ONLY: token auth with the dev root token. Staging/production swap this
# for Kubernetes auth or AppRole against a real Vault — same store NAME so the
# base ExternalSecrets are unchanged across envs.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dep-dlm-vault
spec:
  provider:
    vault:
      server: "http://vault.dep-dlm-sandbox.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-root-token
          namespace: dep-dlm-sandbox
          key: token
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-root-token
  namespace: dep-dlm-sandbox
type: Opaque
stringData:
  token: "root"      # SANDBOX-ONLY dev root token
