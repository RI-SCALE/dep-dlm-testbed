# keycloak (bundled testbed chart) — chart + values both from this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "5" }
spec:
  project: default
  sources:
    - repoURL: https://github.com/ri-scale/dep-dlm-testbed.git
      targetRevision: feat/gitops-deployment-blueprint
      path: deploy/helm-charts/keycloak
      helm:
        valueFiles:
          - $values/deploy/gitops/base/values/keycloak.yaml
    - repoURL: https://github.com/ri-scale/dep-dlm-testbed.git
      targetRevision: feat/gitops-deployment-blueprint
      ref: values
  destination: { server: https://kubernetes.default.svc, namespace: dep-dlm-sandbox }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
