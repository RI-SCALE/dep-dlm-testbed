# Rucio DB bootstrap Job — runs bootstrap-db.py once against ruciodb.
# Mounts rucio.cfg/alembic.ini/idpsecrets.json (rucio-server-cfg) and the script
# (testbed-scripts-rucio) — BOTH projected by ESO from Vault after vault-seed.
#
# ORDERING (the important part):
#   Argo: this Job is applied with sync-wave "5", AFTER the ExternalSecrets
#         (wave 0) in the SAME Application. Argo waits for wave 0 resources to be
#         Healthy (ExternalSecret Ready == target Secret synced) before applying
#         wave 5 — so the mounted Secrets exist when the Job's pod is created,
#         eliminating the FailedMount race. hook: Sync + BeforeHookCreation keeps
#         re-runs clean and logs until the next deploy.
#   Flux: annotations ignored; the bootstrap Kustomization (dependsOn secrets,
#         healthCheck on this Job) provides the same gate.
apiVersion: batch/v1
kind: Job
metadata:
  name: rucio-bootstrap-db
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"      # after ExternalSecrets (wave 0)
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "rucio/rucio-server:release-40.0.0"
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              set -e
              for i in $(seq 1 30); do
                if python3 -c "import socket; socket.create_connection(('${DB_HOST}', 5432), timeout=2).close()" 2>/dev/null; then
                  echo "  ${DB_HOST} reachable"; break
                fi
                echo "  [$i] waiting for ${DB_HOST}..."; sleep 5
              done
              python3 /scripts/bootstrap-db.py
          env:
            - name: DB_HOST
              value: ruciodb
          volumeMounts:
            - { name: rucio-cfg, mountPath: /opt/rucio/etc/rucio.cfg,       subPath: server.cfg }
            - { name: rucio-cfg, mountPath: /opt/rucio/etc/alembic.ini,     subPath: alembic.ini }
            - { name: rucio-cfg, mountPath: /opt/rucio/etc/idpsecrets.json, subPath: idpsecrets.json }
            - { name: bootstrap, mountPath: /scripts }
      volumes:
        - name: rucio-cfg
          secret: { secretName: rucio-server-cfg }
        - name: bootstrap
          secret: { secretName: testbed-scripts-rucio, defaultMode: 0755 }
