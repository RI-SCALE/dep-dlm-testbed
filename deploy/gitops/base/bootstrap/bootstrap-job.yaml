apiVersion: batch/v1
kind: Job
metadata:
  name: rucio-bootstrap-db
  namespace: dep-dlm-sandbox
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "rucio/rucio-server:release-40.0.0"
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              set -e
              for i in $(seq 1 30); do
                if python3 -c "import socket; socket.create_connection(('${DB_HOST}', 5432), timeout=2).close()" 2>/dev/null; then
                  echo "  ${DB_HOST} reachable"; break
                fi
                echo "  [$i] waiting for ${DB_HOST}..."; sleep 5
              done
              python3 /scripts/bootstrap-db.py
          env:
            - name: DB_HOST
              value: ruciodb
          volumeMounts:
            - { name: rucio-cfg, mountPath: /opt/rucio/etc/rucio.cfg,        subPath: server.cfg }
            - { name: rucio-cfg, mountPath: /opt/rucio/etc/alembic.ini,      subPath: alembic.ini }
            - { name: rucio-cfg, mountPath: /opt/rucio/etc/idpsecrets.json,  subPath: idpsecrets.json }
            - { name: bootstrap, mountPath: /scripts }
      volumes:
        - name: rucio-cfg
          secret:
            secretName: rucio-server-cfg
        - name: bootstrap
          secret:
            secretName: testbed-scripts-rucio   # ESO Secret (was ConfigMap in umbrella)
            defaultMode: 0755
