fullnameOverride: rucio-client
volumes:
  - name: certs
    secret:
      secretName: testbed-certs
      defaultMode: 0600
  - name: configs
    secret:
      secretName: testbed-configs
  - name: scripts
    secret:
      secretName: testbed-scripts
      defaultMode: 0755
  - name: tests
    secret:
      secretName: testbed-tests
      defaultMode: 0755
volumeMounts:
  - name: certs
    mountPath: /etc/grid-security/hostcert.pem
    subPath: hostcert.pem
    readOnly: true
  - name: certs
    mountPath: /etc/grid-security/hostkey.pem
    subPath: hostkey.pem
    readOnly: true
  - name: certs
    mountPath: /etc/grid-security/certificates/5fca1cb1.0
    subPath: rucio_ca.pem
    readOnly: true
  - name: certs
    mountPath: /etc/grid-security/certificates/rucio_ca.pem
    subPath: rucio_ca.pem
    readOnly: true
  - name: configs
    mountPath: /opt/rucio/etc/rucio.cfg
    subPath: userpass-client.cfg
    readOnly: true
  - name: scripts
    mountPath: /scripts
    readOnly: true
  - name: tests
    mountPath: /tests
    readOnly: true
