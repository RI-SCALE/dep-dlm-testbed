# Shared FTS values — mirrors the umbrella `fts:` block. testbed-configs is now
# an ESO-managed Secret (was a ConfigMap in the umbrella); volume sources change
# from configMap: to secret: accordingly, mounts are unchanged.
# NOTE: the umbrella split scripts into testbed-scripts / testbed-scripts-fts.
# Seed those into Vault under dep-dlm/scripts-fts and add an ExternalSecret if
# FTS needs the entrypoint; for the bundled testbed chart the entrypoint is in
# the image, so only configs/certs/patches are required here.
fullnameOverride: fts
ftsdb:
  enabled: true
  hostname: ftsdb
ftsdbHost: ftsdb

volumes:
  - name: certs
    secret:
      secretName: testbed-certs
      defaultMode: 0600
      items:
        - { key: hostcert.pem,            path: hostcert.pem,            mode: 0600 }
        - { key: hostkey.pem,             path: hostkey.pem,             mode: 0600 }
        - { key: rucio_ca.pem,            path: rucio_ca.pem,            mode: 0644 }
        - { key: 5fca1cb1.0,              path: 5fca1cb1.0,              mode: 0644 }
        - { key: 5fca1cb1.signing_policy, path: 5fca1cb1.signing_policy, mode: 0644 }
        - { key: b96dc756.0,              path: b96dc756.0,              mode: 0644 }
        - { key: b96dc756.signing_policy, path: b96dc756.signing_policy, mode: 0644 }
  - name: configs
    secret:
      secretName: testbed-configs
  - name: patches
    secret:
      secretName: testbed-patches

volumeMounts:
  - { name: certs, mountPath: /etc/grid-security/hostcert.pem, subPath: hostcert.pem }
  - { name: certs, mountPath: /etc/grid-security/hostkey.pem,  subPath: hostkey.pem }
  - { name: certs, mountPath: /etc/grid-security/certificates/5fca1cb1.0,              subPath: 5fca1cb1.0 }
  - { name: certs, mountPath: /etc/grid-security/certificates/5fca1cb1.signing_policy, subPath: 5fca1cb1.signing_policy }
  - { name: certs, mountPath: /etc/grid-security/certificates/b96dc756.0,              subPath: b96dc756.0 }
  - { name: certs, mountPath: /etc/grid-security/certificates/b96dc756.signing_policy, subPath: b96dc756.signing_policy }
  - { name: certs, mountPath: /etc/pki/ca-trust/source/anchors/rucio-ca.crt, subPath: rucio_ca.pem }
  - { name: configs, mountPath: /etc/fts3/fts3config, subPath: fts3config }
  # tokenMode picks managed vs unmanaged restconfig; overlay sets which key is
  # seeded as fts3restconfig, keeping this mount env-agnostic.
  - { name: configs, mountPath: /etc/fts3/fts3restconfig, subPath: fts3restconfig }
  - { name: configs, mountPath: /etc/gfal2.d/http_plugin.conf, subPath: gfal2_http_plugin.conf }
  - { name: patches, mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/config/middleware.py, subPath: fts--middleware.py }
  - { name: patches, mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/lib/openidconnect.py, subPath: fts--openidconnect.py }
  - { name: patches, mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/lib/JobBuilder.py,     subPath: fts--JobBuilder.py }
