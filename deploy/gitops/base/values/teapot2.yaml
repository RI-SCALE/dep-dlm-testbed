fullnameOverride: teapot2
volumes:
  - name: certs
    secret:
      secretName: testbed-certs
      defaultMode: 0600
      items:
        - { key: teapot2cert.pem,                 path: teapot2cert.pem,                 mode: 0600 }
        - { key: teapot2key.pem,                  path: teapot2key.pem,                  mode: 0600 }
        - { key: storm-webdav-localhostcert.pem,  path: storm-webdav-localhostcert.pem,  mode: 0644 }
        - { key: storm-webdav-localhostkey.pem,   path: storm-webdav-localhostkey.pem,   mode: 0644 }
        - { key: rucio_ca.pem,                    path: rucio_ca.pem,                    mode: 0644 }
  - name: trust
    secret:
      secretName: testbed-certs
      items:
        - { key: rucio_ca.pem,            path: 5fca1cb1.0 }
        - { key: rucio_ca.pem,            path: b96dc756.0 }
        - { key: 5fca1cb1.signing_policy, path: 5fca1cb1.signing_policy }
        - { key: b96dc756.signing_policy, path: b96dc756.signing_policy }
  - name: configs
    secret:
      secretName: testbed-configs
  - name: patches
    secret:
      secretName: testbed-patches
  - name: teapot-data
    persistentVolumeClaim:
      claimName: teapot2-data
volumeMounts:
  - { name: configs, mountPath: /etc/teapot/config.ini,       subPath: config.ini,       readOnly: true }
  - { name: configs, mountPath: /etc/teapot/user-mapping.csv, subPath: user-mapping.csv, readOnly: true }
  - { name: configs, mountPath: /etc/teapot/logback.xml,      subPath: logback.xml,      readOnly: true }
  - { name: certs,   mountPath: /var/lib/teapot/webdav/teapot.crt, subPath: teapot2cert.pem }
  - { name: certs,   mountPath: /var/lib/teapot/webdav/teapot.key, subPath: teapot2key.pem }
  - { name: certs,   mountPath: /var/lib/teapot/webdav/Teapot-testing.crt, subPath: rucio_ca.pem }
  - { name: certs,   mountPath: /usr/local/share/ca-certificates/rucio-ca.crt, subPath: rucio_ca.pem }
  - { name: certs,   mountPath: /etc/storm/webdav/localhost.crt, subPath: storm-webdav-localhostcert.pem }
  - { name: certs,   mountPath: /etc/storm/webdav/localhost.key, subPath: storm-webdav-localhostkey.pem }
  - { name: trust,   mountPath: /etc/grid-security/certificates, readOnly: true }
  - { name: configs, mountPath: /var/lib/teapot/user-teapot/config/application.yml, subPath: application.yml, readOnly: true }
  - { name: configs, mountPath: /var/lib/teapot/user-teapot/sa.d/data.properties,   subPath: data.properties, readOnly: true }
  - { name: patches, mountPath: /usr/share/teapot/teapot.py, subPath: teapot--teapot.py, readOnly: true }
