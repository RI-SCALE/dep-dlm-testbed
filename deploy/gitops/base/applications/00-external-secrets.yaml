# External Secrets Operator — installs the CRDs (ExternalSecret,
# ClusterSecretStore, ...) that the whole secret mechanism depends on.
# MUST exist before any ExternalSecret/ClusterSecretStore syncs, hence the
# earliest sync-wave. This was previously relied upon from a manual install;
# a fresh cluster needs it deployed explicitly.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "-20" }
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7      # TODO: pin to a current release
    helm:
      values: |
        installCRDs: true
  destination: { server: https://kubernetes.default.svc, namespace: external-secrets }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
