# xrootd entrypoint script — the umbrella mounted a custom docker-entrypoint.sh
# from testbed-scripts-xrootd. Seed dep-dlm/scripts-xrootd, then ESO projects it.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: testbed-scripts-xrootd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dep-dlm-vault
    kind: ClusterSecretStore
  target:
    name: testbed-scripts-xrootd
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: dep-dlm/scripts-xrootd
