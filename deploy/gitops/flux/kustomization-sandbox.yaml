# Flux Kustomization — deploys the sandbox environment. Equivalent to the Argo
# app-of-apps-sandbox apps root. Reuses environments/sandbox unchanged.
# NOTE: environments/sandbox emits Argo Application CRs, which Flux should NOT apply.
# For a TRUE Flux port, point this at a Flux-native variant that emits
# HelmRelease objects instead (see flux/README.md). This file shows the SHAPE.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-sandbox
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/environments/sandbox/secrets   # the ESO secrets overlay reuses cleanly
  prune: true
  targetNamespace: dep-dlm-sandbox
