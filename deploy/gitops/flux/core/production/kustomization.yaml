apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Core stage (production) — external Vault + external DB in real deployments. Kept as
# postgresql-only for parity; drop this stage and point at external DSN when
# wiring real external services.
resources:
  - ../../flux-system/gitrepository.yaml
  - ../../sources/helmrepositories.yaml
  - ../../components/postgresql.yaml
patches:
  - target: { kind: HelmRelease }
    patch: |
      - op: replace
        path: /spec/targetNamespace
        value: dep-dlm-production
