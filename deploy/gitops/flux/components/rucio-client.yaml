apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rucio-client
  namespace: flux-system
spec:
  interval: 5m
  releaseName: rucio-client
  targetNamespace: dep-dlm-PLACEHOLDER
  install: { createNamespace: true }
  dependsOn:
    - { name: rucio-server }
  chart:
    spec:
      chart: rucio-client
      version: "40.0.0"
      sourceRef: { kind: HelmRepository, name: rucio, namespace: flux-system }
  # Argo $values -> base/values/rucio-client.yaml; Flux reads it from a ConfigMap the
  # env Kustomization generates (configMapGenerator: rucio-client-values).
  valuesFrom:
    - kind: ConfigMap
      name: rucio-client-values
      valuesKey: rucio-client.yaml
