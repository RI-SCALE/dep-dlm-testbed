apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teapot1
  namespace: flux-system
spec:
  interval: 5m
  releaseName: teapot1
  targetNamespace: dep-dlm-PLACEHOLDER
  install: { createNamespace: true }
  dependsOn:
    - { name: external-secrets }
  chart:
    spec:
      chart: deploy/helm-charts/teapot          # path within the GitRepository
      sourceRef: { kind: GitRepository, name: dep-dlm-testbed, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: teapot1-values
      valuesKey: teapot1.yaml
