# ============================================================================
# DEP DLM — Flux entrypoint (staging)   [equivalent to Argo app-of-apps-staging]
# ============================================================================
# Ordering (fixes the ESO-vs-ExternalSecrets circular dep):
#   namespace -> dep-dlm-staging-eso -> dep-dlm-staging-secrets -> dep-dlm-staging
# ESO installs its CRDs FIRST so the ExternalSecrets can apply.
---
apiVersion: v1
kind: Namespace
metadata:
  name: dep-dlm-staging
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-staging-eso
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/flux/eso
  prune: true
  wait: true                      # block until ESO (and its CRDs) are Ready
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-staging-secrets
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/environments/staging/secrets
  prune: true
  targetNamespace: dep-dlm-staging
  dependsOn:
    - { name: dep-dlm-staging-eso }   # CRDs must exist before ExternalSecrets apply
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-staging
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/flux/environments/staging
  prune: true
  dependsOn:
    - { name: dep-dlm-staging-secrets }
