# ============================================================================
# DEP DLM — Flux entrypoint (sandbox)   [equivalent to Argo app-of-apps-sandbox]
# ============================================================================
# Ordering (fixes the ESO-vs-ExternalSecrets circular dep):
#   namespace -> dep-dlm-sandbox-eso -> dep-dlm-sandbox-secrets -> dep-dlm-sandbox
# ESO installs its CRDs FIRST so the ExternalSecrets can apply.
---
apiVersion: v1
kind: Namespace
metadata:
  name: dep-dlm-sandbox
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-sandbox-eso
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/flux/eso
  prune: true
  wait: true                      # block until ESO (and its CRDs) are Ready
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-sandbox-secrets
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/environments/sandbox/secrets
  prune: true
  targetNamespace: dep-dlm-sandbox
  dependsOn:
    - { name: dep-dlm-sandbox-eso }   # CRDs must exist before ExternalSecrets apply
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dep-dlm-sandbox
  namespace: flux-system
spec:
  interval: 5m
  sourceRef: { kind: GitRepository, name: dep-dlm-testbed }
  path: ./deploy/gitops/flux/environments/sandbox
  prune: true
  dependsOn:
    - { name: dep-dlm-sandbox-secrets }
