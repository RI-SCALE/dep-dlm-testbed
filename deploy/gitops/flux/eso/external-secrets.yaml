apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 5m
  releaseName: external-secrets
  targetNamespace: external-secrets        # cluster infra ns (not per-env)
  install:
    createNamespace: true
    crds: CreateReplace                    # ensure CRDs install with the chart
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: external-secrets
      version: "0.10.7"
      sourceRef: { kind: HelmRepository, name: external-secrets, namespace: flux-system }
  values:
    installCRDs: true
