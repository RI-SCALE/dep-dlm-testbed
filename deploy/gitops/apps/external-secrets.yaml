apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  labels: { dep-dlm.component: external-secrets }
  annotations: { argocd.argoproj.io/sync-wave: "-20" }
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7
    helm: { values: "installCRDs: true\n" }
  destination: { server: https://kubernetes.default.svc, namespace: dep-dlm-PLACEHOLDER }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
