apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  labels: { dep-dlm.component: vault }
  annotations: { argocd.argoproj.io/sync-wave: "-15" }
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.1
    helm:
      values: |
        server:
          dev: { enabled: true, devRootToken: "root" }
          dataStorage: { enabled: false }
          ha: { enabled: false }
  destination: { server: https://kubernetes.default.svc, namespace: dep-dlm-PLACEHOLDER }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
