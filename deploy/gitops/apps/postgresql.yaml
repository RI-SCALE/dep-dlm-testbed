apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ruciodb
  namespace: argocd
  labels: { dep-dlm.component: postgresql }
  annotations: { argocd.argoproj.io/sync-wave: "0" }
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 18.3.0
    helm:
      values: |
        fullnameOverride: ruciodb
        auth: { username: rucio, password: rucio, database: rucio }
        primary: { persistence: { enabled: false } }
  destination: { server: https://kubernetes.default.svc, namespace: dep-dlm-PLACEHOLDER }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
