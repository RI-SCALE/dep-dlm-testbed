# ClusterSecretStore -> sandbox dev Vault (token auth, dev root token). SANDBOX-ONLY.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dep-dlm-vault
spec:
  provider:
    vault:
      server: "http://vault.dep-dlm-sandbox.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-root-token
          namespace: dep-dlm-sandbox
          key: token
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-root-token
  namespace: dep-dlm-sandbox
type: Opaque
stringData:
  token: "root"
