# Production ClusterSecretStore — SAME NAME; real Vault, Kubernetes/AppRole auth.
# Seeded out-of-band by an operator. No seed Job.
# TODO: server, role, auth mount per your production Vault.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dep-dlm-vault
spec:
  provider:
    vault:
      server: "https://vault.prod.example.internal:8200"   # TODO
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "dep-dlm-prod"                              # TODO
          serviceAccountRef:
            name: external-secrets
