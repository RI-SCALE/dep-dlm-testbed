apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dep-dlm-vault
spec:
  provider:
    vault:
      server: "https://vault.example.internal:8200"   # TODO: real Vault
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "dep-dlm"                              # TODO: Vault role
          serviceAccountRef:
            name: external-secrets
