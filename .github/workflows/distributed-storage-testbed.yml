name: Distributed Storage Testbed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            runtime: compose
          - arch: amd64
            runner: ubuntu-latest
            runtime: k8s
          - arch: arm64
            runner: ubuntu-24.04-arm
            runtime: compose
          - arch: arm64
            runner: ubuntu-24.04-arm
            runtime: k8s
    name: ${{ matrix.arch }}
    uses: ./.github/workflows/_run-dep-dlm-testbed.yml
    with:
      runner: ${{ matrix.runner }}
      runtime: ${{ matrix.runtime }}
