name: GitOps (Argo CD)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/gitops/**'
      - 'deploy/helm-charts/**'
      - 'shared/scripts/init-argocd.sh'
      - '.github/workflows/gitops-argocd.yml'

jobs:
  argocd:
    name: argocd | ${{ matrix.env }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        env: [sandbox]          # staging/production need external Vault/DB/IdP
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: dep-dlm-gitops

      - name: Install Argo CD + bootstrap ${{ matrix.env }}
        env:
          GITOPS_ENV: ${{ matrix.env }}
          # Point Argo at THIS PR's repo+branch (Argo reads git, not the runner's
          # working tree). Without this it would track the default branch.
          ARGOCD_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          ARGOCD_REVISION: ${{ github.head_ref || github.ref_name }}
        run: make argocd-install

      - name: Wait for Applications to become Healthy
        run: |
          # Gate on Application HEALTH, not sync status. Some apps stay
          # permanently OutOfSync-but-Healthy and that is EXPECTED:
          #   - dep-dlm-sandbox-secrets: contains the bootstrap hook Job
          #     (hook resources are excluded from Argo's desired-state diff, so
          #     the app is always OutOfSync).
          #   - fts-sandbox: benign post-deploy drift.
          # Health == workload up; sync == git drift. We assert health here and
          # the actual workload (bootstrap Job complete + rucio rollout) next.
          ns=argocd
          for i in $(seq 1 80); do
            total=$(kubectl -n $ns get applications -o name 2>/dev/null | wc -l | tr -d ' ')
            healthy=$(kubectl -n $ns get applications \
              -o custom-columns='NAME:.metadata.name,HS:.status.health.status' \
              --no-headers 2>/dev/null | awk '$2=="Healthy"' | wc -l | tr -d ' ')
            echo "  [$i] $healthy/$total Applications Healthy"
            if [ "$total" -gt 0 ] && [ "$healthy" = "$total" ]; then
              echo "All Applications Healthy"; exit 0
            fi
            kubectl -n $ns get applications \
              -o custom-columns='NAME:.metadata.name,HEALTH:.status.health.status,SYNC:.status.sync.status' \
              --no-headers 2>/dev/null | awk '$2!="Healthy"' | sed 's/^/      not-healthy: /' || true
            sleep 15
          done
          echo "ERROR: Applications did not all become Healthy in time"
          kubectl -n $ns get applications
          exit 1

      - name: Verify workload pods are Running
        run: |
          ns=dep-dlm-${{ matrix.env }}
          # The DB-init Job must have completed (schema created) — the real
          # assertion for the bootstrap step, gated behind the ExternalSecrets.
          kubectl -n $ns wait --for=condition=complete job/rucio-bootstrap-db --timeout=300s
          kubectl -n $ns rollout status deploy/rucio --timeout=300s
          kubectl -n $ns get pods

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== Applications ==="; kubectl -n argocd get applications -o wide || true
          echo "=== Pods ==="; kubectl -n dep-dlm-${{ matrix.env }} get pods -o wide || true
          echo "=== Events ==="
          kubectl -n dep-dlm-${{ matrix.env }} get events --sort-by=.lastTimestamp | tail -50 || true
          for d in vault-seed rucio-bootstrap-db; do
            echo "=== job/$d ==="
            kubectl -n dep-dlm-${{ matrix.env }} logs job/$d --tail=50 2>/dev/null || true
          done

      - name: Tear down
        if: always()
        env:
          GITOPS_ENV: ${{ matrix.env }}
        run: make argocd-uninstall || true
