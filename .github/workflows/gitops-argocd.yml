name: GitOps (Argo CD)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/gitops/**'
      - 'deploy/helm-charts/**'
      - 'shared/scripts/init-argocd.sh'
      - '.github/workflows/gitops-argocd.yml'

jobs:
  argocd:
    name: argocd | ${{ matrix.env }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        env: [sandbox]          # staging/production need external Vault/DB/IdP
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: dep-dlm-gitops

      - name: Install Argo CD + bootstrap ${{ matrix.env }}
        env:
          GITOPS_ENV: ${{ matrix.env }}
          # Point Argo at THIS PR's repo+branch (Argo reads git, not the runner's
          # working tree). Without this it would track the default branch.
          ARGOCD_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          ARGOCD_REVISION: ${{ github.head_ref || github.ref_name }}
        run: make argocd-install

      - name: Wait for Applications to converge
        run: |
          # app-of-apps + ApplicationSet fan-out is async. Poll until every
          # Application EXCEPT the bootstrap hook is Healthy+Synced. The
          # rucio-bootstrap Application wraps a Sync-hook Job, which Argo does not
          # track as a normal resource, so it never reports Healthy — assert on
          # its Job in the next step instead.
          ns=argocd
          IGNORE='rucio-bootstrap'
          for i in $(seq 1 80); do
            total=$(kubectl -n $ns get applications -o name 2>/dev/null \
              | grep -v "/${IGNORE}" | wc -l | tr -d ' ')
            ready=$(kubectl -n $ns get applications \
              -o custom-columns='NAME:.metadata.name,HS:.status.health.status,SS:.status.sync.status' \
              --no-headers 2>/dev/null \
              | grep -v "^${IGNORE} " | awk '$2=="Healthy" && $3=="Synced"' | wc -l | tr -d ' ')
            echo "  [$i] $ready/$total (excluding ${IGNORE}) Healthy+Synced"
            if [ "$total" -gt 0 ] && [ "$ready" = "$total" ]; then
              echo "All tracked Applications converged"; exit 0
            fi
            kubectl -n $ns get applications \
              -o custom-columns='NAME:.metadata.name,HEALTH:.status.health.status,SYNC:.status.sync.status' \
              --no-headers 2>/dev/null | awk '!($2=="Healthy" && $3=="Synced")' | sed 's/^/      pending: /' || true
            sleep 15
          done
          echo "ERROR: Applications did not converge in time"
          kubectl -n $ns get applications
          exit 1

      - name: Verify workload pods are Running
        run: |
          ns=dep-dlm-${{ matrix.env }}
          # The DB-init Job must have completed (schema created) — this is the
          # real assertion for the bootstrap step.
          kubectl -n $ns wait --for=condition=complete job/rucio-bootstrap-db --timeout=300s
          kubectl -n $ns rollout status deploy/rucio --timeout=300s
          kubectl -n $ns get pods

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== Applications ==="; kubectl -n argocd get applications -o wide || true
          echo "=== Pods ==="; kubectl -n dep-dlm-${{ matrix.env }} get pods -o wide || true
          echo "=== Events ==="
          kubectl -n dep-dlm-${{ matrix.env }} get events --sort-by=.lastTimestamp | tail -50 || true
          for d in vault-seed rucio-bootstrap-db; do
            echo "=== job/$d ==="
            kubectl -n dep-dlm-${{ matrix.env }} logs job/$d --tail=50 2>/dev/null || true
          done

      - name: Tear down
        if: always()
        env:
          GITOPS_ENV: ${{ matrix.env }}
        run: make argocd-uninstall || true
