name: Run DEP DLM Testbed

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      runtime:
        required: false
        type: string
        default: compose
        description: "compose | k8s"
      daemon_mode:
        required: false
        type: string
        default: direct
        description: "direct | daemons"
    secrets:
      S3_ACCESS_KEY:
        required: false
      S3_SECRET_KEY:
        required: false

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    name: ${{ inputs.runtime }} | ${{ inputs.daemon_mode }} | ${{ matrix.mode }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        mode: [managed, unmanaged]
    env:
      TESTBED_HOST_SOURCE: ${{ github.workspace }}
      RUNTIME: ${{ inputs.runtime }}
      TOKEN_MODE: ${{ matrix.mode }}
      DAEMON_MODE: ${{ inputs.daemon_mode }}
      COMPOSE_FILE: deploy/compose/docker-compose.${{ matrix.mode }}.ci.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU for multi-arch emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Generate certificates
        run: make certs

      - name: Set up kind cluster
        if: inputs.runtime == 'k8s'
        uses: helm/kind-action@v1
        with:
          cluster_name: dep-dlm-testbed

      - name: Install Helm
        if: inputs.runtime == 'k8s'
        uses: azure/setup-helm@v4

      - name: Start stack
        run: make start

      - name: Wait for rucio server ready (k8s)
        if: inputs.runtime == 'k8s'
        run: |
          kubectl -n dep-dlm-testbed rollout status deploy/rucio --timeout=300s
          # Wait for postStart gfal2 install to complete before running tests.
          # The postStart hook runs asynchronously alongside httpd; rollout status
          # only confirms httpd readiness, not hook completion.
          echo "Waiting for gfal2 to be available in rucio container..."
          for i in $(seq 1 24); do
            kubectl -n dep-dlm-testbed exec deploy/rucio -c rucio -- \
              python3 -c "import gfal2" 2>/dev/null && \
              { echo "gfal2 ready"; exit 0; }
            echo "  [$i] gfal2 not yet available, waiting 10s..."
            sleep 10
          done
          echo "ERROR: gfal2 not available after 240s — postStart hook may have failed"
          kubectl -n dep-dlm-testbed describe pod -l app=rucio | grep -A 5 "Events:"
          exit 1

      - name: Wait for rucio daemons ready (k8s, daemon mode)
        if: inputs.runtime == 'k8s' && inputs.daemon_mode == 'daemons'
        run: |
          # In daemon mode the long-running daemons must converge before tests.
          # Their postStart also installs gfal2 asynchronously, and they race
          # the bootstrap job on first start, so wait for the deployments to
          # report available rather than assuming immediate readiness.
          for d in conveyor-submitter conveyor-poller conveyor-finisher \
                   judge-evaluator judge-cleaner reaper; do
            echo "Waiting for rucio-daemons-$d..."
            kubectl -n dep-dlm-testbed rollout status \
              deploy/rucio-daemons-$d --timeout=300s || {
                echo "ERROR: rucio-daemons-$d did not become available"
                kubectl -n dep-dlm-testbed describe deploy/rucio-daemons-$d | grep -A 5 "Events:" || true
                kubectl -n dep-dlm-testbed logs deploy/rucio-daemons-$d --tail=50 || true
                exit 1
              }
          done
          echo "All daemons available"

      - name: Initialize DEP DLM testbed
        env:
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: make init

      - name: Wait for fts (compose)
        if: inputs.runtime == 'compose'
        run: |
          for i in $(seq 1 40); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' \
              https://localhost:8446/whoami) || true
            [[ "$code" == "200" ]] && { echo "fts REST ready"; exit 0; }
            echo "  [$i] HTTP $code"; sleep 5
          done
          make logs SERVICES=fts; exit 1

      - name: Wait for fts (k8s)
        if: inputs.runtime == 'k8s'
        run: |
          kubectl -n dep-dlm-testbed rollout status deploy/fts --timeout=300s
          for i in $(seq 1 40); do
            code=$(kubectl -n dep-dlm-testbed exec deploy/fts -- \
              curl -sk -o /dev/null -w '%{http_code}' \
              https://localhost:8446/whoami) || true
            [[ "$code" == "200" ]] && { echo "fts REST ready"; exit 0; }
            echo "  [$i] HTTP $code"; sleep 5
          done
          kubectl -n dep-dlm-testbed logs deploy/fts --tail=200; exit 1

      - name: fts OIDC token auth check (compose)
        if: inputs.runtime == 'compose'
        run: |
          TOKEN=$(docker exec compose-fts-1 curl -sk \
            -u "rucio:rucio-secret" \
            -d "grant_type=password&username=randomaccount&password=secret" \
            https://keycloak:8443/realms/rucio/protocol/openid-connect/token \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          [ -z "$TOKEN" ] && { echo "Failed to obtain token"; exit 1; }
          RESP=$(curl -sk --cacert certs/rucio_ca.pem \
            -H "Authorization: Bearer $TOKEN" \
            https://localhost:8446/whoami)
          echo "whoami response: $RESP"
          METHOD=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('method',''))")
          [ "$METHOD" = "oauth2" ] || { echo "Expected method=oauth2, got: $METHOD"; exit 1; }
          echo "fts OIDC auth OK (method=$METHOD)"

      - name: fts OIDC token auth check (k8s)
        if: inputs.runtime == 'k8s'
        run: |
          TOKEN=$(kubectl -n dep-dlm-testbed exec deploy/fts -- curl -sk \
            -u "rucio:rucio-secret" \
            -d "grant_type=password&username=randomaccount&password=secret" \
            https://keycloak:8443/realms/rucio/protocol/openid-connect/token \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          [ -z "$TOKEN" ] && { echo "Failed to obtain token"; exit 1; }
          RESP=$(kubectl -n dep-dlm-testbed exec deploy/fts -- curl -sk \
            -H "Authorization: Bearer $TOKEN" \
            https://localhost:8446/whoami)
          echo "whoami response: $RESP"
          METHOD=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('method',''))")
          [ "$METHOD" = "oauth2" ] || { echo "Expected method=oauth2, got: $METHOD"; exit 1; }
          echo "fts OIDC auth OK (method=$METHOD)"

      - name: Rucio E2E TPC transfer test
        run: make test-rucio-transfers

      - name: Rucio E2E TPC transfer test with Copernicus Sentinel data
        env:
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: make test-copernicus-transfers

      - name: Rucio E2E deletion test
        run: make test-rucio-deletion

      # Diagnostics
      - name: Dump logs on failure (compose)
        if: failure() && inputs.runtime == 'compose'
        run: |
          for svc in fts rucio keycloak xrd3 xrd4 teapot1 teapot2; do
            echo "=== $svc ==="
            make logs SERVICES=$svc 2>/dev/null || true
          done

      - name: Dump logs on failure (k8s)
        if: failure() && inputs.runtime == 'k8s'
        run: |
          echo "=== Pod status ==="
          kubectl -n dep-dlm-testbed get pods -o wide
          echo "=== Recent events ==="
          kubectl -n dep-dlm-testbed get events --sort-by=.lastTimestamp | tail -50
          for deploy in fts rucio keycloak xrd3 xrd4 teapot1 teapot2; do
            echo "=== $deploy ==="
            kubectl -n dep-dlm-testbed logs deploy/$deploy --tail=200 2>/dev/null || true
          done
          # Daemon diagnostics only relevant in daemon mode
          if [ "${{ inputs.daemon_mode }}" = "daemons" ]; then
            for d in conveyor-submitter conveyor-poller conveyor-finisher \
                     judge-evaluator judge-cleaner reaper; do
              echo "=== rucio-daemons-$d ==="
              kubectl -n dep-dlm-testbed logs deploy/rucio-daemons-$d --tail=200 2>/dev/null || true
            done
          fi

      - name: Tear down
        if: always()
        run: make stop
